name: CI/CD Pipeline - Acxess Production

on:
  push:
    branches:
      - main 
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Convierte el nombre de tu imagen (Debe coincidir EXACTAMENTE con el de tu docker-compose)
  IMAGE_NAME: ${{ github.repository_owner }}/acxess-web

jobs:
  # ==========================================
  # FASE 1: Integración Continua (CI)
  # ==========================================
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download code source
        uses: actions/checkout@v4

      # BASE PARA EL FUTURO: 
      # Tests:
      # - name: Ejecutar Pruebas Unitarias
      #   run: dotnet test ./Acxess.Tests/Acxess.Tests.csproj

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Usamos un token temporal que GitHub provee automáticamente (muy seguro)
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar etiquetas para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Construir y enviar a GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acxess.Web/DOCKERFILE
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ==========================================
  # FASE 2: Despliegue Continuo (CD)
  # ==========================================
  deploy:
    name: 🚀 Desplegar en Servidor VPS
    needs: build-and-push 
    runs-on: ubuntu-latest
    
    steps:
      - name: Conectar al VPS por SSH y Actualizar Contenedores
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MENDEZ_SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/acxess
            
            # 1. Forzar a Docker a descargar la versión más reciente que acabamos de compilar
            docker compose pull
            
            # 2. Levantar todo: La BD, ejecutar el migrador y arrancar la app
            docker compose --profile app up -d
            
            # 3. Limpieza: Borrar las imágenes viejas de Docker para que no se llene el disco duro del servidor
            docker image prune -af