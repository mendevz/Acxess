name: CI/CD Pipeline - Acxess Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag to deploy (ej. v1.0.0).'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/acxess-web
  APP_VERSION: ${{ github.event.inputs.version_tag || github.ref_name }}

jobs:
  # ==========================================
  # FASE 1: Integración Continua (CI)
  # ==========================================
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download code source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.APP_VERSION }}

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.APP_VERSION }}
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acxess.Web/DOCKERFILE
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}

  # ==========================================
  # FASE 2: Despliegue Continuo (CD)
  # ==========================================
  deploy:
    name: Deploy to VPS mendez-server
    needs: build-and-push 
    runs-on: ubuntu-latest
    
    steps:
      - name: Connect to VPS via SSH and Update Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MENDEZ_SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_VERSION
          script: |
            cd /opt/acxess

            if grep -q "^APP_VERSION=" .env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=${APP_VERSION}/" .env
            else
              echo "APP_VERSION=${APP_VERSION}" >> .env
            fi
            
            # 1. Force Docker to download the most recent version we just compiled
            docker compose pull
            
            # 2. Start everything: The DB, run the migrator and start the app
            docker compose --profile app up -d --force-recreate
            
            # 3. Cleanup: Delete old Docker images to prevent the server's hard drive from filling up
            docker image prune -f
