services:
  # ==============================
  # DataBase SQL Server
  # ==============================
  acxess-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_acxess_container
    restart: unless-stopped
    mem_limit: 3072m
    cpus: 1.0
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express  
      - TZ=America/Mexico_City 
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      retries: 10
      start_period: 30s
      timeout: 3s
    ports:
      - "1433:1433" 
    volumes:
      - sql_data:/var/opt/mssql 
      - /etc/localtime:/etc/localtime:ro
    networks:
      - acxess-network

  # ==============================
  # Distributed Cache
  # ==============================
  acxess-redis:
    image: redis:7-alpine
    container_name: redis_acxess
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - acxess-network
    # profiles: ["tools", "app"]

  # ==============================
  #  Data base migrator 
  # ==============================
  acxess-migrator:
    build:
      context: ..
      dockerfile: src/Acxess.Web/DOCKERFILE
    container_name: acxess_migrator
    command: ["dotnet", "Acxess.Web.dll", "--migrate-only"]
    depends_on:
      acxess-db:
        condition: service_healthy
    environment:
      - ConnectionStrings__Default=Server=acxess-db;Database=AcxessDB;User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - SystemUser__Password=${SYSTEM_USER_PASSWORD}
      - CloudflareR2__BucketName=${S3_BUCKET_NAME}
      - CloudflareR2__AccessKey=${S3_ACCESS_KEY}
      - CloudflareR2__SecretKey=${S3_SECRET_KEY}
      - CloudflareR2__ServiceURL=${S3_SERVICE_URL}
      - CloudflareR2__PublicDomain=${S3_PUBLIC_DOMAIN}
    networks:
      - acxess-network
    # profiles: ["tools", "app"]
    volumes:
      - /etc/localtime:/etc/localtime:ro
    
  
  # ==============================
  #  Seq - Log Management (Dev Environment)
  # ==============================

  seq:
    image: datalust/seq:latest
    container_name: seq_acxess
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SYSTEM_USER_PASSWORD}
    ports:
      - "8081:80"
      - "5341:5341"
    volumes:
      - seq_data:/data
    networks:
      - acxess-network
    # profiles: ["tools", "app"]

  # ==============================
  #  App Web
  # ==============================
  acxess-web:
    build:
      context: .. 
      dockerfile: src/Acxess.Web/DOCKERFILE
    container_name: acxess_web
    mem_limit: 512m
    restart: "no"
    depends_on:
      acxess-db:
        condition: service_healthy
      acxess-migrator:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT} 
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Server=acxess-db;Database=AcxessDB;User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=acxess-redis:6379,password=${REDIS_PASSWORD},abortConnect=False
      - SystemUser__Password=${SYSTEM_USER_PASSWORD}
      - RUN_MIGRATIONS=false
      - TZ=America/Mexico_City 
      - OpenTelemetry__Endpoint=${OPEN_TELEMETRY_ENDPOINT}
      - OpenTelemetry__Token=${OPEN_TELEMETRY_TOKEN}
      - CloudflareR2__BucketName=${S3_BUCKET_NAME}
      - CloudflareR2__AccessKey=${S3_ACCESS_KEY}
      - CloudflareR2__SecretKey=${S3_SECRET_KEY}
      - CloudflareR2__ServiceURL=${S3_SERVICE_URL}
      - CloudflareR2__PublicDomain=${S3_PUBLIC_DOMAIN}
    ports:
      - "5000:8080" 
    networks:
      - acxess-network
    # profiles: ["app"]
    volumes:
      - acxess_keys:/root/.aspnet/DataProtection-Keys

  # ==============================
  # Stack WhatsApp (Evolution API)
  # ==============================
  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution_db
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_password
      POSTGRES_DB: evolution_api
      TZ: America/Mexico_City
    ports:
      - "5433:5432" 
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acxess-network
    # profiles: ["tools", "app"]

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution_redis
    ports:
      - "6380:6379"
    volumes:
      - evolution_redis_data:/data
    networks:
      - acxess-network
    # profiles: ["tools", "app"]

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    mem_limit: 512m
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    ports:
      - "8082:8080"
    environment:
      - SERVER_URL=http://localhost:8082
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY} 
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1023204200
      # Database Settings
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_password@evolution-postgres:5432/evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      # Redis
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      # RAM Settings
      - WEBSOCKET_ENABLED=false
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - TYPEBOT_INTEGRATION=false
      - CHATWOOT_INTEGRATION=false
      - READ_MESSAGES=true
      - REJECT_CALLS=true
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - acxess-network
    # profiles: ["tools", "app"]

volumes:
  sql_data:
  seq_data:
  redis_data:
  evolution_pgdata:       
  evolution_redis_data:   
  evolution_instances:
  acxess_keys:

networks:
  acxess-network:
    driver: bridge
